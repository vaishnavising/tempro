{% extends 'layout/public_base.html' %}
{% load static %}
{% block title %} Dashboard {% endblock title %}
{% block stylesheets %}
<script type="text/javascript" src="https://cdn.jsdelivr.net/jquery/latest/jquery.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.0.1/css/buttons.dataTables.min.css">

<style>
    .icon {
        color: black;
        font-size: 27px;
        padding-top: 2%;
        padding-right: 5%;
        display: inline-block;
        justify-content: center;
        margin-right: 5%;
        text-align: center;
        border-right: 1px solid black;
    }
</style>
{% endblock stylesheets %}
{% block content %}
<!-- Header -->
<div class="header bg-secondary p-0">
    <div class="container-fluid">
        <div class="header-body">
            <div class="card-body">
                <div class="row icon-examples d-flex justify-content-between">
                    <div class="col-lg-10">
                        <h2 class="mb-0"><i class="fa-solid fa-file"></i> Exceedance Report</h2>
                    </div> 
                </div>
                <hr>
                <div class="row">
                    <div class="col-lg-3">
                        <select class="form-control form-control-sm" id="report-site-uuid">
                            <option class="d-none" value="">Select TNPCB Station</option>
                            {% for site in siteObj %}
                            <option value="{{site.id}}">
                                {{site.prefix|title}} - {{site.name|upper}} ({{site.status}})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div id="reportrange" class="col-lg-3"
                        style="background: #fff; cursor: pointer; padding: 0px 0px; border: 1px solid #ccc; width: 100%">
                        <input type="text" name="daterange" class="form-control form-control-sm"
                            style="width: 100%; font-style: normal;" value="" />
                    </div>
                    <div class="col-lg-1">
                        <a onclick="fetch_report()" class="btn btn-sm btn-info text-white">Fetch</a>
                    </div>
                </div>
                <hr>
                <!-- Table for Data Display -->
                <table id="site-report-table" class="table table-striped table-bordered">
                    <thead>
                        <tr id="table-header">
                            <!-- Headers will be generated dynamically -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be populated via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
{% block javascripts %}
<script>
    $(function () {
        // Initialize the date range picker
        $('input[name="daterange"]').daterangepicker({
            opens: 'left'
        });

        // Optional: You can auto-load the report on date change or button click
        // $('input[name="daterange"]').on('apply.daterangepicker', function(ev, picker) {
        //     fetch_report();
        // });
    });

    function fetch_report() {
        let site_uuid = $('#report-site-uuid').val().trim();
        let daterange = $('input[name="daterange"]').val();

        if (!site_uuid) {
            alert("Please select a valid site.");
            return false;
        }

        $.ajax({
            url: '/Aaxisnano/site_exceedance',
            type: 'GET',
            data: {
                "site-uuid": site_uuid,
                "daterange": daterange
            },
            dataType: 'json',
            success: function (response) {
                console.log("Exceedance Report:", response);

                // Destroy existing DataTable if exists
                if ($.fn.DataTable.isDataTable('#site-report-table')) {
                    $('#site-report-table').DataTable().clear().destroy();
                }

                // Clear table headers and body
                $('#table-header').html('');
                $('#table-body').html('');

                if (response.data && response.data.length > 0) {
                    // Build dynamic headers
                    let headers = Object.keys(response.data[0]);
                    let headerRow = headers.map(key => `<th>${key}</th>`).join('');
                    $('#table-header').html(headerRow);

                    // Populate rows
                    response.data.forEach(rowData => {
                        let row = '<tr>' + headers.map(key => `<td>${rowData[key] ?? ''}</td>`).join('') + '</tr>';
                        $('#table-body').append(row);
                    });

                    // Initialize DataTable
                    $('#site-report-table').DataTable({
                        paging: true,
                        searching: true,
                        destroy: true,
                        dom: 'Bfrtip',
                        buttons: [
                            {
                                extend: 'csvHtml5',
                                text: 'Download CSV',
                                titleAttr: 'Export to CSV',
                                className: 'mt-2 btn btn-success',
                                filename: `${response.site_name}_Exceedance_Report`
                            }
                        ]
                    });
                } else {
                    $('#table-body').append(`
                        <tr>
                            <td colspan="10" class="text-center text-danger">
                                No data available for the selected site and date range.
                            </td>
                        </tr>
                    `);
                }
            },
            error: function (xhr, status, error) {
                console.error('Fetch Report Error:', status, error);
                alert("An error occurred while fetching the report. Please try again.");
            }
        });
    }
</script>


<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.0.1/js/buttons.html5.min.js"></script>
{% endblock javascripts %}
