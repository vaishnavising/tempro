<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700">
  <link rel="stylesheet" href="/static/custom-assets/css/argon.css?v=1.2.0" type="text/css">

<style>
/* ================= RESET ================= */
* {
  box-sizing: border-box;
}

img {
  max-width: 100%;
  height: auto;
}

/* ================= BACKGROUND ================= */
body {
  min-height: 100vh;
  background: linear-gradient(
      rgba(0, 0, 0, 0.45),
      rgba(0, 0, 0, 0.45)
    ),
    url('/static/custom-assets/img/src-img.jpg') no-repeat center center fixed;
  background-size: cover;
  font-family: 'Open Sans', sans-serif;
}

/* ================= CONTAINER ================= */
.container {
  padding-left: 15px;
  padding-right: 15px;
}

/* ================= GLASS CARD ================= */
.card {
  width: 100%;
  background: rgba(255, 255, 255, 0.18);
<!--  backdrop-filter: blur(16px);-->
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.25);
<!--  box-shadow: 0 22px 55px rgba(0, 0, 0, 0.45);-->
  animation: fadeUp 0.6s ease-in-out;
}

.card-header {
  background: transparent;
  border-bottom: 1px solid rgba(255, 255, 255, 0.25);
}

.card-header h2 {
  font-size: 1.4rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.6px;
}

/* ================= INPUTS ================= */
.form-control {
  width: 100%;
  background: rgba(255, 255, 255, 0.9);
  border: none;
  height: 50px;
  border-radius: 14px;
  font-size: 0.95rem;
}

.form-control:focus {
  box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.45);
}

/* ================= INPUT GROUP ================= */
.input-group {
  width: 100%;
  flex-wrap: nowrap;
}

.input-group-text {
  background: rgba(255, 255, 255, 0.9);
  border: none;
  border-radius: 14px 0 0 14px;
}

.input-group-text i {
  color: #667eea;
}

/* ================= BUTTON ================= */
.btn-primary {
  background: linear-gradient(135deg,rgba(118, 75, 162, 0.55));
  border: none;
  border-radius: 45px;
  padding: 12px 36px;
  font-weight: 600;
  letter-spacing: 0.6px;
  box-shadow: 0 10px 30px rgba(118, 75, 162, 0.55);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px rgba(118, 75, 162, 0.7);
}

/* ================= CAPTCHA ================= */
.captcha-image {
  display: block;
  margin: 0 auto;
  background: #ffffff;
  padding: 8px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
}

.captcha-refresh {
  background: none;
  border: none;
  color: #ffffff;
  font-size: 1.1rem;
}

/* ================= ALERT ================= */
.alert {
  border-radius: 10px;
  font-size: 0.9rem;
}

/* ================= ANIMATION ================= */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================= MOBILE ================= */
@media (max-width: 576px) {

  .card-header h2 {
    font-size: 1.2rem;
  }

  .card-body {
    padding: 1.25rem;
  }

  .input-group {
    flex-wrap: wrap;
  }

  .input-group-prepend,
  .input-group-append {
    width: 100%;
  }

  .input-group-text {
    width: 100%;
    justify-content: center;
    border-radius: 12px 12px 0 0;
  }

  .form-control {
    border-radius: 0 0 12px 12px;
    height: 48px;
  }

  .form-group .input-group-append button {
    width: 100%;
    margin-top: 8px;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
  }
}
.input-group-text i {
  color: rgba(118, 75, 162, 0.75);
}
.form-control {
  background: transparent !important;
  color: #ffffff;          /* text visible rahe */
}

/* ================= TABLET ================= */
@media (max-width: 768px) {
  .card {
    margin-bottom: 20px;
  }
}
</style>
</head>
<body>
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7 col-sm-10 col-sm-10">
      <div class="card">
        <div class="card-header text-center">
          <h2>Login Page</h2>
        </div>
        <div class="card-body">
        <form role="form" action="{% url 'corepy:login' %}" method="POST" autocomplete="off">            {% csrf_token %}
            <div class="form-group">
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                </div>
                 <input class="form-control"
                       name="email"
                       placeholder="Username"
                       type="text"
                       required>
              </div>
            </div>
            <div class="form-group">
              <div class="input-group">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                </div>
                    <input class="form-control"
                       name="password"
                       id="password"
                       placeholder="Password"
                       type="password"
                       required>
              </div>
            </div>
            <div class="form-group text-center">
              <img src="{{ captcha_image }}" class="captcha-image">
            </div>
                 <input type="hidden"
                   name="captcha_0"
                   value="{{ captcha_key }}">
                <div class="form-group d-flex justify-content-between align-items-center">
                  <div class="input-group">
                     <input class="form-control"
                                   type="text"
                                   id="captcha-form"
                                   name="captcha_1"
                                   placeholder="Enter CAPTCHA text"
                                   required>
                      <div class="input-group-append">
                        <button class="btn btn-primary me-md-2 captcha-refresh" type="button">
                          <i class="fa fa-refresh"></i>
                        </button>
                      </div>
                    </div>
                </div>
<!--            <div class="form-group">-->
<!--              <div class="input-group">-->
<!--                <input class="form-control" placeholder="Enter CAPTCHA" required>-->
<!--                <div class="input-group-append">-->
<!--                  <button class="btn btn-primary captcha-refresh" type="button">-->
<!--                    <i class="fa fa-refresh"></i>-->
<!--                  </button>-->
<!--                </div>-->
<!--              </div>-->
<!--            </div>-->
            <center>
                <button type="submit" class="btn btn-primary my-3">Sign in</button>
            </center>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% block javascripts %}
    <script>
      $(function () {
      function refreshCaptcha() {
        var $form = $('form');
        var url = `${window.location.origin}/captcha/refresh/`;
        $.getJSON(url, {}, function (json) {
          $form.find('input[name="captcha_0"]').val(json.key);
          $form.find('img.captcha-image').attr('src', json.image_url);
        });
      }

      $('.captcha-refresh').click(function (e) {
        e.preventDefault();
        refreshCaptcha();
      });
    });
      setTimeout(function () {
        $('.alert.message').fadeOut(500);
      }, 4000);

      $('#showhide').click(function () {
        var x = document.getElementById("password");
        if (x.type === "password") {
          $(this).removeClass('fa-eye-slash').addClass('fa-eye');
          x.type = "text";
        } else {
          $(this).removeClass('fa-eye').addClass('fa-eye-slash');
          x.type = "password";
        }
      });
    </script>
    {% endblock javascripts %}
</body>
</html>
